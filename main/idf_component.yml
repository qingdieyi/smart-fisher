# ═══════════════════════════════════════════════════════════════════
# ESP-IDF 组件依赖声明 — idf_component.yml
#
# ── 这是什么？ ───────────────────────────────────────────────────
#
# 这个文件告诉 ESP-IDF 组件管理器（Component Manager）：
#   "我们需要以下第三方组件，请在构建时自动下载"
#
# ── Java 类比 ─────────────────────────────────────────────────────
#
#   idf_component.yml     →  类似 pom.xml
#   espressif/esp32-camera →  类似 groupId:artifactId
#   ^2.0.0                →  类似 version 约束（兼容 2.x）
#
# ═══════════════════════════════════════════════════════════════════

dependencies:
  espressif/esp32-camera:
    version: "^2.0.0"

  # ESP-DL 深度学习推理引擎（YOLO 模式需要）
  #
  # 启用方式: idf.py menuconfig → Smart Fisher Configuration
  #           → Fish Detection Method → YOLO Object Detection
  #
  # 如果不使用 YOLO（默认的帧差法），注释掉下面两行。
  # ESP-DL 组件约 3MB 下载大小，编译后库约 100KB。
  #
  # 详细文档: docs/esp-dl-yolo-plan.md
  # 实操指南: docs/yolo-practical-guide.md
  espressif/esp-dl:
    version: "^3.3.0"
